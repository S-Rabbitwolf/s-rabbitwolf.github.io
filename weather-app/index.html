<!DOCTYPE html>
<html>
<head>
	
	<!-- meta tags and title -->
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Lewisville Weather Report</title>

	<!-- external and internal CSS -->
	<link rel="stylesheet" href="styles.css" media="all">
	<style>
		/* in-file CSS here */
	</style>

	<!-- external and internal JavaScript -->
	<script src="scripts.js" defer></script>
	<script>
		// in-page JavaScript here
	</script>

</head>
<body id="weatherBackground">
<main class="weather">

  
  <h1 id="locationName">Loading...</h1>

  
<section class="search">
  <form id="search-form">
    <label for="cityInput">Enter a city:</label>
    <input type="text" id="cityInput" name="cityInput" placeholder="City Search">
    <button type="submit">Search</button>
  </form>
</section>

  <section class="current">
    <!-- Separate section for current weather-->
    <div class="temp" id="currentTemp">72°F</div>

    <div class="condition">
      <img id="currentIcon" src="" alt="Weather icon">
      <p id="currentCondition">Loading</p>
    </div>

    <div class="wind" id="currentWind">Loading</div>

    <div class="humidity" id="currentHumidity">Loading</div>

  </section>

  <!---- 3-Day  -->
  <section class="forecast">

    <h2>3-Day Forecast</h2>

    <div class="day">
      <h3 id="forecastDay1">Today</h3>
      <img id="forecastDay1Icon" src="" alt="Weather icon">
      <p id="forecastDay1Condition">Partly Cloudy</p>
      <p id="forecastDay1Temp">68F–78F</p>
      <p id="forecastDay1Wind">Wind: 10 mph S</p>
    </div>

    <div class="day">
      <h3 id="forecastDay2">Tomorrow</h3>
      <img id="forecastDay2Icon" src="" alt="Weather icon">
      <p id="forecastDay2Condition">Light Rain</p>
      <p id="forecastDay2Temp">64F–73F</p>
      <p id="forecastDay2Wind">Wind: 14 mph SSE</p>
    </div>

    <div class="day">
      <h3 id="forecastDay3">Day 3</h3>
      <img id="forecastDay3Icon" src="" alt="Weather icon">
      <p id="forecastDay3Condition">Mostly Sunny</p>
      <p id="forecastDay3Temp">66F–80F</p>
      <p id="forecastDay3Wind">Wind: 9 mph W</p>
    </div>

  </section>

</main>
	

</body>

</html>
